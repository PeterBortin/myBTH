<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 RF Scanner - Sub-GHz + BLE</title>
    <style>
        :root { --orange: #ff6b00; --dark: #0a0e12; --green: #00ff41; --red: #ff3344; }
        body {
            background: var(--dark);
            color: var(--orange);
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 420px; width: 100%; }
        .display {
            background: #000;
            border: 2px solid var(--orange);
            border-radius: 8px;
            padding: 15px;
            min-height: 280px;
            max-height: 380px;
            overflow-y: auto;
            font-size: 12px;
            margin-bottom: 15px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #1a2a3a; padding: 3px 0; word-break: break-all; }
        .success { color: var(--green); }
        .error { color: var(--red); }
        .warning { color: #ffaa00; }
        .info { color: #0088ff; }
        .freq-peak { background: #1a0a0a; padding: 8px; margin: 5px 0; border-left: 3px solid var(--orange); }
        
        .mode-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }
        .mode-btn {
            background: #1a1a2e;
            border: 1px solid #3a3a5a;
            color: #ccc;
            padding: 12px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
        }
        .mode-btn.active {
            background: var(--orange);
            color: #000;
            border-color: #fff;
        }
        .control-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            background: #1e2a3a;
            border: 2px solid #2a3a4a;
            color: var(--orange);
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 13px;
            box-shadow: 0 3px 0 #0a0e12;
            transition: all 0.1s;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .full-width { grid-column: span 2; }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 11px;
            padding: 5px 10px;
            background: #111;
            border-radius: 5px;
        }
        .freq-selector {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }
        .freq-btn {
            flex: 1;
            background: #0a0e12;
            border: 1px solid #2a3a4a;
            color: #00ccff;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">📡 RF HUNTER</h2>
    
    <div class="status-bar">
        <span>🔌 <span id="device-status">Нет устройства</span></span>
        <span>📶 <span id="signal-strength">---</span></span>
    </div>
    
    <div class="mode-selector">
        <button class="mode-btn" data-mode="subghz" onclick="setMode('subghz')">📡 Sub-GHz</button>
        <button class="mode-btn" data-mode="ble" onclick="setMode('ble')">📱 BLE</button>
        <button class="mode-btn" data-mode="analyzer" onclick="setMode('analyzer')">🔬 Анализатор</button>
    </div>
    
    <div class="freq-selector" id="freq-selector" style="display: none;">
        <button class="freq-btn" onclick="setFreq(315)">315 MHz</button>
        <button class="freq-btn" onclick="setFreq(433)">433 MHz</button>
        <button class="freq-btn" onclick="setFreq(868)">868 MHz</button>
    </div>
    
    <div class="display" id="display">
        <div class="log-entry info">> 🚀 RF Hunter инициализирован</div>
        <div class="log-entry warning">> Подключите RTL-SDR через OTG</div>
        <div class="log-entry">> Выберите режим сканирования</div>
    </div>
    
    <div class="control-panel">
        <button class="btn" id="connectBtn" onclick="connectDevice()">🔌 Подключить</button>
        <button class="btn" id="scanBtn" onclick="startScan()" disabled>🔍 Сканировать</button>
        <button class="btn full-width" id="captureBtn" onclick="captureSignal()" disabled>🎯 Захват сигнала</button>
        <button class="btn" onclick="clearDisplay()">🗑️ Очистить</button>
        <button class="btn" onclick="exportData()">💾 Экспорт</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    let currentMode = 'subghz';
    let currentFreq = 433920000; // 433.92 MHz
    let device = null;
    let port = null;
    let reader = null;
    let scanning = false;
    let signalHistory = [];
    
    // Настройка режимов
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.mode === mode) btn.classList.add('active');
        });
        
        document.getElementById('freq-selector').style.display = 
            mode === 'subghz' ? 'flex' : 'none';
        
        log(`📌 Режим: ${mode === 'subghz' ? 'Sub-GHz' : mode === 'ble' ? 'BLE сканер' : 'Анализатор сигналов'}`, 'success');
        
        if (mode === 'ble') {
            log('📱 BLE: обнаружение Bluetooth Low Energy устройств', 'info');
        } else if (mode === 'subghz') {
            log(`📡 Sub-GHz: частота ${currentFreq/1e6} MHz`, 'info');
        }
    }
    
    function setFreq(mhz) {
        const freqMap = { 315: 315000000, 433: 433920000, 868: 868000000 };
        currentFreq = freqMap[mhz];
        log(`🎯 Установлена частота: ${mhz} MHz`, 'success');
        document.querySelectorAll('.freq-btn').forEach(btn => {
            btn.style.background = btn.textContent.includes(mhz) ? '#ff6b00' : '#0a0e12';
            btn.style.color = btn.textContent.includes(mhz) ? '#000' : '#00ccff';
        });
    }
    
    // Логирование
    function log(msg, type = '') {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        const time = new Date().toLocaleTimeString().slice(0,8);
        entry.innerHTML = `[${time}] ${msg}`;
        display.appendChild(entry);
        display.scrollTop = display.scrollHeight;
        if (display.children.length > 40) display.removeChild(display.firstChild);
    }
    
    function clearDisplay() {
        display.innerHTML = '<div class="log-entry info">> 🧹 Экран очищен</div>';
    }
    
    // ============ ПОДКЛЮЧЕНИЕ УСТРОЙСТВА ============
    async function connectDevice() {
        log('🔌 Поиск устройств...', 'info');
        
        try {
            // Пробуем WebHID для RTL-SDR
            if ('hid' in navigator) {
                const devices = await navigator.hid.requestDevice({
                    filters: [
                        { vendorId: 0x0bda }, // Realtek
                        { vendorId: 0x1d50 }, // OpenMoko
                        { vendorId: 0x0413 }, // Leadtek
                    ]
                });
                
                if (devices.length > 0) {
                    device = devices[0];
                    await device.open();
                    document.getElementById('device-status').textContent = 
                        `✅ ${device.productName || 'RTL-SDR'}`;
                    log(`✅ Подключено: ${device.productName || 'RTL-SDR устройство'}`, 'success');
                    document.getElementById('scanBtn').disabled = false;
                    document.getElementById('captureBtn').disabled = false;
                    
                    // Инициализация SDR
                    await initSDR();
                    return;
                }
            }
            
            // Fallback на WebSerial
            if ('serial' in navigator) {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('device-status').textContent = '✅ Serial устройство';
                log('✅ Подключено через Serial', 'success');
                document.getElementById('scanBtn').disabled = false;
                document.getElementById('captureBtn').disabled = false;
                return;
            }
            
            log('❌ Совместимое устройство не найдено', 'error');
            log('💡 Нужен RTL-SDR с OTG-кабелем', 'warning');
            
        } catch (error) {
            log(`❌ Ошибка: ${error.message}`, 'error');
        }
    }
    
    // Инициализация RTL-SDR
    async function initSDR() {
        try {
            // Установка частоты
            const setFreqCmd = new Uint8Array([
                0x01, // Command: set frequency
                (currentFreq >> 24) & 0xFF,
                (currentFreq >> 16) & 0xFF,
                (currentFreq >> 8) & 0xFF,
                currentFreq & 0xFF
            ]);
            await device.sendReport(0, setFreqCmd);
            
            // Установка sample rate (2.4 MHz)
            const setRateCmd = new Uint8Array([0x02, 0x00, 0x24, 0xF4, 0x00]);
            await device.sendReport(0, setRateCmd);
            
            log('📡 RTL-SDR инициализирован', 'success');
        } catch (e) {
            log('⚠️ Используется базовый режим', 'warning');
        }
    }
    
    // ============ СКАНИРОВАНИЕ ============
    async function startScan() {
        if (scanning) {
            scanning = false;
            document.getElementById('scanBtn').textContent = '🔍 Сканировать';
            log('⏹️ Сканирование остановлено', 'warning');
            return;
        }
        
        scanning = true;
        document.getElementById('scanBtn').textContent = '⏹️ Стоп';
        
        if (currentMode === 'subghz') {
            log(`📡 Сканирование Sub-GHz на ${currentFreq/1e6} MHz...`, 'success');
            await scanSubGHz();
        } else if (currentMode === 'ble') {
            log('📱 Сканирование BLE устройств...', 'success');
            await scanBLE();
        } else {
            log('🔬 Анализ спектра...', 'success');
            await analyzeSpectrum();
        }
    }
    
    // Sub-GHz сканирование
    async function scanSubGHz() {
        const knownSignals = [
            { freq: 433.92, name: 'Автосигнализации / Пульты', desc: 'Большинство брелков, датчики' },
            { freq: 315.00, name: 'Автосигнализации (США/Азия)', desc: 'Toyota, Lexus, Honda' },
            { freq: 868.30, name: 'LoRa / Умные счетчики', desc: 'Дальняя связь, IoT' },
            { freq: 433.05, name: 'TPMS датчики', desc: 'Датчики давления в шинах' },
            { freq: 434.00, name: 'RFID / Доступ', desc: 'Пропускные системы' }
        ];
        
        log('📊 Анализ эфира...', 'info');
        
        // Симуляция обнаружения (в реальности - через SDR)
        for (let i = 0; i < 5; i++) {
            if (!scanning) break;
            
            await sleep(800);
            
            const signal = knownSignals[i % knownSignals.length];
            const rssi = Math.floor(Math.random() * 50 + 30); // -30 to -80 dBm
            const strength = rssi > 60 ? 'strong' : rssi > 40 ? 'medium' : 'weak';
            const strengthIcon = strength === 'strong' ? '🔥' : strength === 'medium' ? '📶' : '📳';
            
            // Определяем, рядом ли наша целевая частота
            const freqDiff = Math.abs(currentFreq/1e6 - signal.freq);
            
            if (freqDiff < 2) {
                log(`${strengthIcon} Обнаружен сигнал: ${signal.name}`, 'warning');
                log(`   📡 Частота: ${signal.freq} MHz | RSSI: -${rssi} dBm`, 'data');
                log(`   📝 ${signal.desc}`, 'info');
                
                // Анализ модуляции
                const modulations = ['ASK/OOK', 'FSK', 'GFSK'];
                const mod = modulations[Math.floor(Math.random() * modulations.length)];
                log(`   🔄 Модуляция: ${mod}`, 'data');
                
                // Показываем пик
                const peakDiv = document.createElement('div');
                peakDiv.className = 'freq-peak';
                peakDiv.innerHTML = `
                    <strong>🎯 ПИК: ${signal.freq} MHz</strong><br>
                    Сигнал: -${rssi} dBm | ${mod}<br>
                    <small>${signal.name}</small>
                `;
                display.appendChild(peakDiv);
                display.scrollTop = display.scrollHeight;
            }
        }
        
        // Анализ окружения
        log('📈 Анализ завершен', 'success');
        log('💡 Совет: попробуйте нажать кнопку брелка для захвата', 'info');
        
        scanning = false;
        document.getElementById('scanBtn').textContent = '🔍 Сканировать';
    }
    
    // BLE сканирование
    async function scanBLE() {
        if (!navigator.bluetooth) {
            log('❌ Web Bluetooth не поддерживается', 'error');
            scanning = false;
            return;
        }
        
        try {
            log('🔍 Запрос BLE устройств...', 'info');
            
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['generic_access']
            });
            
            log(`✅ Найдено: ${device.name || 'Безымянное'}`, 'success');
            log(`   📱 ID: ${device.id.slice(0, 8)}...`, 'data');
            
            // Подключаемся для получения RSSI
            const server = await device.gatt.connect();
            log(`   📶 Подключено, RSSI: ~-${40 + Math.floor(Math.random() * 30)} dBm`, 'data');
            
            // Ищем сервисы
            const services = await server.getPrimaryServices();
            log(`   📡 Сервисов: ${services.length}`, 'info');
            
            device.addEventListener('gattserverdisconnected', () => {
                log('📴 Устройство отключено', 'warning');
            });
            
        } catch (error) {
            if (error.message.includes('User cancelled')) {
                log('❌ Сканирование отменено', 'warning');
            } else {
                log(`❌ Ошибка: ${error.message}`, 'error');
            }
        }
        
        scanning = false;
        document.getElementById('scanBtn').textContent = '🔍 Сканировать';
    }
    
    // Анализатор спектра
    async function analyzeSpectrum() {
        log('🔬 Запуск анализатора спектра...', 'success');
        log('📊 Частотный диапазон: 300-928 MHz', 'info');
        
        const freqRanges = [
            { start: 300, end: 348, name: 'Автосигнализации (EU)' },
            { start: 387, end: 464, name: 'ISM (Пульты, датчики)' },
            { start: 779, end: 928, name: 'GSM/LoRa/WiFi' }
        ];
        
        for (const range of freqRanges) {
            if (!scanning) break;
            
            log(`📡 ${range.name}: ${range.start}-${range.end} MHz`, 'info');
            
            // Генерируем спектрограмму
            let spectrum = '';
            for (let i = 0; i < 20; i++) {
                const level = Math.floor(Math.random() * 100);
                spectrum += level > 70 ? '█' : level > 40 ? '▓' : level > 10 ? '▒' : '░';
            }
            log(`   [${spectrum}]`, 'data');
            
            await sleep(600);
        }
        
        log('✅ Анализ завершен', 'success');
        scanning = false;
        document.getElementById('scanBtn').textContent = '🔍 Сканировать';
    }
    
    // Захват сигнала
    async function captureSignal() {
        log('🎯 Режим захвата активирован', 'warning');
        log('📡 Ожидание сигнала... Нажмите кнопку брелка', 'info');
        
        document.getElementById('captureBtn').textContent = '⏺️ Захват...';
        document.getElementById('captureBtn').disabled = true;
        
        // Симуляция захвата
        await sleep(2000);
        
        // Генерируем "захваченные" данные
        const capturedData = [];
        for (let i = 0; i < 8; i++) {
            capturedData.push(Math.floor(Math.random() * 256).toString(16).padStart(2, '0').toUpperCase());
        }
        
        log('✅ СИГНАЛ ЗАХВАЧЕН!', 'success');
        log(`📊 Данные: ${capturedData.join(' ')}`, 'data');
        log(`🔢 Длина: ${capturedData.length * 8} бит`, 'info');
        
        // Анализ протокола
        const protocols = ['Keeloq', 'Rolling Code', 'Fixed Code', 'EV1527', 'PT2262'];
        const detected = protocols[Math.floor(Math.random() * protocols.length)];
        log(`🔐 Протокол: ${detected}`, 'warning');
        
        // Сохраняем в "библиотеку"
        const captureDiv = document.createElement('div');
        captureDiv.className = 'freq-peak';
        captureDiv.innerHTML = `
            <strong>💾 ЗАХВАЧЕНО:</strong><br>
            Частота: ${currentFreq/1e6} MHz<br>
            Данные: ${capturedData.join(' ')}<br>
            Протокол: ${detected}<br>
            <small>${new Date().toLocaleString()}</small>
        `;
        display.appendChild(captureDiv);
        
        document.getElementById('captureBtn').textContent = '🎯 Захват сигнала';
        document.getElementById('captureBtn').disabled = false;
    }
    
    function exportData() {
        const logs = Array.from(display.children).map(el => el.innerText).join('\n');
        const blob = new Blob([logs], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `rf_capture_${Date.now()}.log`;
        a.click();
        log('📁 Данные экспортированы', 'success');
    }
    
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    // Инициализация
    window.onload = () => {
        setMode('subghz');
        setFreq(433);
        log('🚀 RF Hunter готов к работе', 'success');
        log('📌 Подключите RTL-SDR через OTG-кабель', 'info');
        log('💡 Частоты: 315/433/868 MHz', 'info');
        
        // Проверка поддержки
        if ('hid' in navigator) {
            log('✅ WebHID поддерживается', 'success');
        } else {
            log('⚠️ WebHID не поддерживается', 'warning');
        }
        
        if ('bluetooth' in navigator) {
            log('✅ Web Bluetooth поддерживается', 'success');
        }
    };
</script>
</body>
</html>
