<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Flipper Clone</title>
    <style>
        :root {
            --orange: #ff8c00;
            --black: #1a1a1a;
            --green: #00ff00;
        }

        body {
            background-color: var(--black);
            color: var(--orange);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        #screen {
            width: 320px;
            height: 200px;
            border: 4px solid var(--orange);
            background-color: #222;
            padding: 10px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
            font-size: 12px;
            border-radius: 10px;
        }

        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #333; }
        .success { color: var(--green); }
        .info { color: #00ccff; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 320px;
        }

        button {
            background: var(--orange);
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
        }

        button:active {
            transform: scale(0.95);
            background: #e67e00;
        }

        .status-bar {
            width: 320px;
            font-size: 10px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <h2>FLIPPER JS-EDITION</h2>

    <div class="status-bar">
        <span>BT: READY</span>
        <span id="bt-status">DISCONNECTED</span>
    </div>

    <div id="screen">
        <div class="log-entry">Waiting for command...</div>
    </div>

    <div class="controls">
        <button onclick="scanDevices()">Scan BLE</button>
        <button onclick="readBattery()">Read Bat</button>
        <button onclick="clearLogs()" style="background: #444; color: white;">Clear</button>
        <button onclick="getDeviceInfo()">Device Info</button>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const btStatus = document.getElementById('bt-status');
        let connectedDevice = null;

        function log(text, type = '') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `> ${text}`;
            screen.appendChild(entry);
            screen.scrollTop = screen.scrollHeight;
        }

        // Поиск любого устройства
        async function scanDevices() {
            log('Starting scan...', 'info');
            try {
                // Ищем любые устройства (acceptAllDevices требует отсутствия filters)
                connectedDevice = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['battery_service', 'device_information']
                });

                log(`Found: ${connectedDevice.name || 'Unknown'}`, 'success');
                btStatus.innerText = 'CONNECTED';
                
                connectedDevice.addEventListener('gattserverdisconnected', () => {
                    log('Device disconnected', 'info');
                    btStatus.innerText = 'DISCONNECTED';
                });

            } catch (error) {
                log('Error: ' + error.message);
            }
        }

        // Пример: Чтение уровня заряда батареи
        async function readBattery() {
            if (!connectedDevice) return log('Connect first!', 'info');

            try {
                log('Connecting to GATT...');
                const server = await connectedDevice.gatt.connect();
                const service = await server.getPrimaryService('battery_service');
                const char = await service.getCharacteristic('battery_level');
                const value = await char.readValue();
                
                log(`Battery Level: ${value.getUint8(0)}%`, 'success');
            } catch (error) {
                log('Read Error: ' + error.message);
            }
        }

        // Пример: Чтение информации об устройстве
        async function getDeviceInfo() {
            if (!connectedDevice) return log('Connect first!', 'info');

            try {
                log('Reading Info...');
                const server = await connectedDevice.gatt.connect();
                const service = await server.getPrimaryService('device_information');
                
                // Пробуем прочитать производителя (Characteristic 0x2A29)
                const char = await service.getCharacteristic('manufacturer_name_string');
                const value = await char.readValue();
                const decoder = new TextDecoder('utf-8');
                
                log(`Maker: ${decoder.decode(value)}`, 'success');
            } catch (error) {
                log('Info Error: ' + error.message);
            }
        }

        function clearLogs() {
            screen.innerHTML = '<div class="log-entry">Logs cleared.</div>';
        }
    </script>
</body>
</html>
